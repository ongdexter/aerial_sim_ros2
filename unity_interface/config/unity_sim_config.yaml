        y: 180.0
        z: 0.0
    robots:
      uav1:
        startPosition:
          x: -70.0
          y: 30.0
          z: 60.0
        startOrientation:
          roll: 0.0
          pitch: 0.0
          yaw: 0.0
      ugv1:
        startPosition:
          x: -70.0
          y: 30.0
          z: 1.0
        startOrientation:
          roll: 0.0
          pitch: 0.0
          yaw: 0.0

  - scene: Range15Scene
    renderMesh:
      glb: sfm_meshes/range15_mesh.glb
      position:
        x: 0.0
        y: -137.65
        z: 0.0
      rotation:
        x: 0.0
        y: 180.0
        z: 0.0
    colliderMesh:
      glb: sfm_meshes/range15_mesh_500k.glb
      position:
        x: 0.0
        y: -137.65
        z: 0.0
      rotation:
        x: 0.0
        y: 180.0
        z: 0.0
    robots:
      uav1:
        startPosition:
          x: -165.0
          y: 80.0
          z: 60.0
        startOrientation:
          roll: 0.0
